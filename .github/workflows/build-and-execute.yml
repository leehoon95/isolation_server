name: Server Build & Execute

on:
  workflow_dispatch: # GitHub 웹 UI에서 수동 실행 가능
  
jobs:
  build-and-execute:
    # 셀프 호스팅 러너 지정을 위해 self-hosted를 설정합니다.
    # 필요시 특정 태그(예: [self-hosted, linux, x64])를 조합할 수 있습니다.
    runs-on: self-hosted

    # (선택) 작업 디렉터리 설정 - 기본값은 레포지토리 루트입니다.
    # working-directory: ./

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build isolation_pb
        working-directory: ./libs/isolation_pb
        run: sh ./libs/isolation_pb/cpp.sh

      # 2. 이전 빌드 캐시/잔재 정리 (Self-hosted 러너 필수 권장)
      - name: Clean build directory
        run: rm -rf build

      # 3. CMake 구성 (Configure)
      - name: Configure CMake
        run: cmake -S . -B build

      # 4. 빌드 (Build)
      # -j $(nproc) 옵션으로 호스트 PC의 모든 CPU 코어를 활용해 병렬 빌드합니다.
      - name: Build project
        run: cmake --build build --config Release

      # 5. 프로그램 실행 (Execute)
      - name: Run Executable
        run: |
          echo "=== Executing Program ==="
          ./build/test_server # 실제 생성되는 바이너리 파일 이름으로 변경
