edition="2023";

enum RM_Type {
	RM_UNSPECIFIED = 0;
    RM_DISCONNECTED = 200;
	CM_REQUEST_ROOM_LIST = 201;
	SM_RESPONSE_ROOM_LIST = 202;
	CM_REQUEST_ROOM_ENTER = 203;
	SM_RESPONSE_ROOM_ENTER = 204;
	CM_REQUEST_ROOM_LEAVE = 205;
	SM_RESPONSE_ROOM_LEAVE = 206;
	CM_REQUEST_CREATE_ROOM = 207;
	SM_RESPONSE_CREATE_ROOM = 208;
	CM_BC_MESSAGE = 209;
	SM_BC_MESSAGE = 210;
}

message RM_RequestRoomList {
	int32 filter = 1;
}

message RM_RoomSmallInfo {
	int32 roomIndex = 1;
	string roomName = 2;
}

message RM_ResultRoomList {
	int32 count = 1;
	repeated RM_RoomSmallInfo list = 2;
}

message RM_RequestCreateRoom {
	string roomName = 1;
}

message RM_ResultCreateRoom {
	int32 roomIndex = 1;
	string reason = 2;
}

message RM_RequestEnterRoom {
	int32 roomIndex = 1;
}

message RM_ResultEnterRoom {
	bool result = 1;
	string reason = 2;
}

message RM_BroadcastMessage {
	string message = 1;
	int32 time = 2;
}