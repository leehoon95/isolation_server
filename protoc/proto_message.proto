edition="2023";


// type of message
enum PROTO_MessageType {
	UNSPECIFIED = 0;
	DISCONNECTED = 1;
	REQUEST_LOGIN = 2;
	LOGIN_RESULT = 3;
	REQUEST_SYNC = 4;
	REQUEST_SYNC_RESULT = 5;
	REPORT_CHARACTER_PHYSICS = 6;
	SYNC_CHARACTER_PHYSICS = 7;
}

message PROTO_ObjectTransform {
	int32 clientIndex = 1;
	float x = 2;
	float y = 3;
	float z = 4;
	float r = 5;
}



// Request to server.
message PROTO_RequestLogin {
	string nickname = 1;
}

message PROTO_RequestSync {
	int32 clientIndex = 1;
}


// Response from server.
message PROTO_LoginResult {
	int32 clientIndex = 1;
	string reason = 2;
}

message PROTO_RequestSyncResult {
	int32 roomIndex = 1;
}

// type: REPORT_CHARACTER_PHYSICS
message PROTO_ReportCharacterPhysics {
	int32 roomIndex = 1;
	PROTO_ObjectTransform transform = 2;
}

// type: SYNC_CHARACTER_PHYSICS
message PROTO_SyncCharacterPhysics {
	repeated PROTO_ObjectTransform transfoms = 1;
}