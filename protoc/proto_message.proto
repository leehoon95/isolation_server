edition="2023";


// proto type of message
// CTM: Client tcp message
// STM: Server tcp message
enum PM_Type {
	UNSPECIFIED = 0;
	DISCONNECTED = 1;
	ERORR_MESSAGE = 18;
	
	// login
	CTM_REQUEST_LOGIN = 2;
	STM_RESULT_LOGIN = 3;
	
	// room list
	CTM_REQUEST_ROOM_LIST = 4;
	STM_RESULT_ROOM_LIST = 5;
	CTM_ROOM_ENTER = 6;
	STM_ROOM_ENTER = 7;
	CTM_ROOM_LEAVE = 8;
	STM_ROOM_LEAVE = 9;
	CTM_REQUEST_CREATE_ROOM = 19;
	STM_RESULT_CREATE_ROOM = 20;
	
	// in waiting room
	CTM_CLIENT_SETTING = 10;
	STM_BC_CLIENT = 11;
		
	// in play room
	CTM_SYNC_PLAYER_INFO = 12;
	STM_BC_OTHER_PLAYER_INFO = 13;
	
	
	CMU_SYNC_PLAYER_PHYSICS = 14;
	SMU_SYNC_PLAYER_PHYSICS = 15;
	
	REPORT_CHARACTER_PHYSICS = 16;
	SYNC_CHARACTER_PHYSICS = 17;
}


// proto messages



message PM_RequestLogin {
	string nickname = 1;
}

message PM_LoginResult {
	int32 clientIndex = 1;
	string reason = 2;
}

message PM_RequestRoomList {
	int32 filter = 1;
}

message PM_RoomSmallInfo {
	int32 roomIndex = 1;
	string roomName = 2;
}

message PM_ResultRoomList {
	int32 count = 1;
	repeated PM_RoomSmallInfo list = 2;
}

message PM_RequestCreateRoom {
	string roomName = 1;
}

message PM_ResultCreateRoom {
	int32 roomIndex = 1;
	string reason = 2;
}


message PM_RequestSync {
	int32 clientIndex = 1;
}

message PM_RequestSyncResult {
	int32 roomIndex = 1;
}

message PM_ReportCharacterPhysics {
	int32 roomIndex = 1;
	PM_ObjectTransform transform = 2;
}

message PM_SyncCharacterPhysics {
	repeated PM_ObjectTransform transfoms = 1;
}

message PM_ObjectTransform {
	int32 clientIndex = 1;
	float x = 2;
	float y = 3;
	float z = 4;
	float r = 5;
}