edition="2023";

message CharacterPosition {
  int32 id = 1;
  float x = 2;
  float y = 3;
  float z = 4;
}

enum MessageType {
	MT_UNSPECIFIED = 0;
	MT_LOGIN = 1;
	MT_SYNC_POSITION = 2;
	MT_BROADCAST = 3;
}

message LoginMessage {
	string nickname = 1;
}

message LoginResultMessage {
	bool result = 1;
	string reason = 2;
}

message SyncMessage {
	repeated CharacterPosition characters = 1;
}